name: PR

on:
  pull_request:

concurrency:
  group: pr-${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    env:
      TURBO_TELEMETRY_DISABLED: "1"
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Cache Turbo
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ hashFiles('pnpm-lock.yaml', 'package.json', 'turbo.json', '.oxlintrc.json') }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check SDK generation drift
        run: |
          pnpm sdk:typescript:generate
          if [ -n "$(git status --porcelain -- sdk/typescript/openapi/openapi.json sdk/typescript/src/generated)" ]; then
            echo "Generated SDK files are out of date. Run 'pnpm sdk:typescript:generate' and commit the results."
            git status --short -- sdk/typescript/openapi/openapi.json sdk/typescript/src/generated
            git diff -- sdk/typescript/openapi/openapi.json sdk/typescript/src/generated
            exit 1
          fi

      - name: Lint
        run: pnpm lint

      - name: Knip Dependency Gate
        run: pnpm knip:deps:ci

      - name: Typecheck
        run: pnpm typecheck:changed

      - name: Build Frontend
        run: pnpm build:frontend

      - name: Test
        run: pnpm test:changed
