name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    env:
      TURBO_TELEMETRY_DISABLED: "1"
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}

    # services:
    #   postgres:
    #     image: postgres:18
    #     env:
    #       POSTGRES_DB: scheduling
    #       POSTGRES_USER: scheduling
    #       POSTGRES_PASSWORD: scheduling
    #     ports:
    #       - 5433:5432
    #     options: >-
    #       --health-cmd "pg_isready -U scheduling -d scheduling"
    #       --health-interval 10s
    #       --health-timeout 5s
    #       --health-retries 5
    #   valkey:
    #     image: valkey/valkey:8
    #     ports:
    #       - 6380:6379
    #     options: >-
    #       --health-cmd "valkey-cli ping"
    #       --health-interval 10s
    #       --health-timeout 5s
    #       --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ hashFiles('pnpm-lock.yaml', 'package.json', 'turbo.json', '.oxlintrc.json') }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check SDK generation drift
        run: |
          pnpm sdk:typescript:generate
          if [ -n "$(git status --porcelain -- sdk/typescript/openapi/openapi.json sdk/typescript/src/generated)" ]; then
            echo "Generated SDK files are out of date. Run 'pnpm sdk:typescript:generate' and commit the results."
            git status --short -- sdk/typescript/openapi/openapi.json sdk/typescript/src/generated
            git diff -- sdk/typescript/openapi/openapi.json sdk/typescript/src/generated
            exit 1
          fi

      - name: Lint
        run: pnpm lint

      - name: Knip Dependency Gate
        run: pnpm knip:deps:ci

      - name: Typecheck (changed)
        if: github.event_name == 'pull_request'
        run: pnpm typecheck:changed

      - name: Typecheck (full)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: pnpm typecheck

      - name: Build Frontend
        run: pnpm build:frontend

      - name: Test (changed)
        if: github.event_name == 'pull_request'
        run: pnpm test:changed

      - name: Test (full)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        # env:
        #   DATABASE_URL: postgres://scheduling:scheduling@localhost:5433/scheduling
        #   REDIS_URL: redis://localhost:6380
        run: pnpm test
