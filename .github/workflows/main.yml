name: Main

on:
  push:
    branches:
      - main
    tags:
      - "v*"

concurrency:
  group: main-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    env:
      TURBO_TELEMETRY_DISABLED: "1"
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Cache Turbo
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ hashFiles('pnpm-lock.yaml', 'package.json', 'turbo.json', '.oxlintrc.json') }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check SDK generation drift
        run: |
          pnpm sdk:typescript:generate
          if [ -n "$(git status --porcelain -- sdk/typescript/openapi/openapi.json sdk/typescript/src/generated)" ]; then
            echo "Generated SDK files are out of date. Run 'pnpm sdk:typescript:generate' and commit the results."
            git status --short -- sdk/typescript/openapi/openapi.json sdk/typescript/src/generated
            git diff -- sdk/typescript/openapi/openapi.json sdk/typescript/src/generated
            exit 1
          fi

      - name: Lint
        run: pnpm lint

      - name: Knip Dependency Gate
        run: pnpm knip:deps:ci

      - name: Typecheck
        run: pnpm typecheck

      - name: Build Frontend
        run: pnpm build:frontend

      - name: Test
        # env:
        #   DATABASE_URL: postgres://scheduling:scheduling@localhost:5433/scheduling
        #   REDIS_URL: redis://localhost:6380
        run: pnpm test

  publish-api-image:
    needs: test-and-lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve image name
        id: image
        run: |
          OWNER="${GITHUB_REPOSITORY_OWNER,,}"
          REPO_NAME="${GITHUB_REPOSITORY##*/}"
          REPO_NAME="${REPO_NAME,,}"
          echo "name=ghcr.io/${OWNER}/${REPO_NAME}-api" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=main,enable={{is_default_branch}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          {
            echo "## API image published"
            echo ""
            echo "- Image: \\`${{ steps.image.outputs.name }}\\`"
            echo "- Digest: \\`${{ steps.build.outputs.digest }}\\`"
            echo "- Tags:"
            echo '${{ steps.meta.outputs.tags }}' | sed '/^$/d' | sed 's/^/  - `/' | sed 's/$/`/'
          } >> "$GITHUB_STEP_SUMMARY"
