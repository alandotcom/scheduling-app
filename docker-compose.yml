services:
  postgres:
    image: postgres:18
    container_name: scheduling-postgres
    environment:
      POSTGRES_USER: scheduling
      POSTGRES_PASSWORD: scheduling
      POSTGRES_DB: scheduling
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scheduling -d scheduling"]
      interval: 10s
      timeout: 5s
      retries: 5

  valkey:
    image: valkey/valkey:8
    container_name: scheduling-valkey
    ports:
      - "6380:6379"
    volumes:
      - valkey-data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  valkey-data:
