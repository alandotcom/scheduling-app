packages:
  - apps/*
  - packages/*
  - sdk/*

allowBuilds:
  better-sqlite3: true
  esbuild: true
  inngest-cli: true
  msw: true
  protobufjs: true

catalog:
  '@logtape/logtape': ^2.0.2
  '@types/bun': ^1.3.9
  drizzle-orm: 1.0.0-beta.15-859cf75
  typescript: ^5.9.3
  zod: ^4.3.6

confirmModulesPurge: false

onlyBuiltDependencies:
  - '-'
  - /
  - '@'
  - a
  - better-sqlite3
  - c
  - e
  - esbuild
  - g
  - i
  - l
  - msgpackr-extract
  - msw
  - inngest-cli
  - p
  - r
  - s
  - t

patchedDependencies:
  evalite@1.0.0-beta.16: patches/evalite@1.0.0-beta.16.patch

storeDir: .pnpm-store
