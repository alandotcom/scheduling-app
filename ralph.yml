# Workflow Port Preset (Spec-Driven)
#
# Tuned for:
#   specs/workflow-engine-domain-triggering/
#
# Usage:
#   ralph run --config ralph.yml
#   ralph run --config ralph.yml --prompt "Continue from current checkpoint"

event_loop:
  prompt_file: "specs/workflow-engine-domain-triggering/PROMPT.md"
  completion_promise: "LOOP_COMPLETE"
  max_iterations: 140
  max_runtime_seconds: 21600
  checkpoint_interval: 4

cli:
  backend: "codex"

core:
  specs_dir: "./specs/"

hats:
  builder:
    name: "Builder"
    description: "Implements one task with project quality gates. One task, one commit."
    triggers: ["build.task"]
    publishes: ["build.done", "build.blocked"]
    default_publishes: "build.done"
    instructions: |
      ## BUILDER MODE

      You're building, not planning. One task, then exit.

      ### Mission Context (Current Spec)
      - Implement only from:
        - `specs/workflow-engine-domain-triggering/design.md`
        - `specs/workflow-engine-domain-triggering/plan.md`
        - `specs/workflow-engine-domain-triggering/requirements.md`
      - Execute steps in `plan.md` order unless explicitly blocked.
      - Preserve parity with `../notifications-workflow` `main` where technically compatible.

      ### Project Context (Scheduling App Monorepo)
      - Runtime/tooling: Bun + pnpm workspaces (not Cargo/Jest)
      - Apps: `apps/api` (Hono/oRPC), `apps/admin-ui` (React + TanStack), shared `packages/db` + `packages/dto`
      - Active development rules:
        - No backwards-compatibility shims
        - No new incremental DB migrations; update initial SQL and push schema in dev
        - Delete dead code rather than commenting it out
      - Always follow nearest `AGENTS.md`/`CLAUDE.md` instructions before implementing
      - Workflow-specific non-negotiables:
        - Trigger ingress must be canonical domain events, not webhook trigger requests
        - Keep webhook delivery feature behavior intact
        - Add `org_id` + org-scoped RLS on all workflow tables
        - Enforce admin-only writes and member read-only workflow access

      ### Process: Explore → Plan → Implement → Verify → Commit

      1. **EXPLORE** — Understand before changing
         - Pick ONE task (highest priority from task list)
         - Read relevant files and understand current implementation
         - Search for similar patterns in the codebase
         - Identify integration points and dependencies
         - Determine scope: API, admin UI, db, dto, or cross-package

      2. **PLAN** — Think before coding
         - Outline the specific changes needed
         - Identify files to create/modify
         - Consider edge cases and error handling
         - Keep solutions simple and consistent with existing patterns

      3. **IMPLEMENT** — Execute the plan
         - Write the code following existing patterns
         - Prefer direct changes over compatibility layers
         - For DB schema changes: update initial migration/schema and run:
           - `pnpm --filter @scheduling/db run push`
           - `pnpm db:seed` if seed data needs alignment

      4. **VERIFY** — Must pass before commit
         - Run formatting and quality gates from repo root:
           - `pnpm format`
           - `pnpm lint`
           - `pnpm typecheck` (never package-level typecheck)
         - Run dependency hygiene check when dependencies/schema contracts change:
           - `pnpm knip:deps`
         - Run tests for impacted scope:
           - API changes: `pnpm --filter @scheduling/api run test`
           - DB changes: `pnpm --filter @scheduling/db run test`
           - Cross-cutting/risky changes: `pnpm test`
         - For admin UI changes, run browser QA with `agent-browser`:
           - Validate changed flow end-to-end (including login when relevant)
           - Capture at least one screenshot and verify no regressions
           - Check modal open/close behavior and keyboard interactions when touched

      5. **COMMIT** — Document the change
         - One task, one commit
         - Publish event with evidence: commands run + pass/fail summary + QA notes

      ### DON'T
      - ❌ Decide what tasks to add
      - ❌ Output the completion promise
      - ❌ Skip the explore step
      - ❌ Skip formatting/lint/typecheck/tests
      - ❌ Run multiple dev servers simultaneously
      - ❌ Add migration shims/feature flags for old behavior
      - ❌ Introduce webhook-trigger workflow ingress as the primary trigger path


  reviewer:
    name: "Reviewer"
    description: "Reviews implementation for quality. Does NOT modify code."
    triggers: ["review.request"]
    publishes: ["review.approved", "review.changes_requested"]
    default_publishes: "review.approved"
    instructions: |
      ## REVIEWER MODE

      Review the most recent implementation for quality.

      ### Checklist
      - [ ] **Correctness:** Does it match the spec/task requirements?
      - [ ] **Tests:** Are there tests? Do they cover edge cases?
      - [ ] **Patterns:** Does it follow existing codebase patterns?
      - [ ] **Errors:** Is error handling appropriate?
      - [ ] **Security:** Any obvious vulnerabilities?
      - [ ] **Repo Gates:** Were `pnpm format`, `pnpm lint`, and root `pnpm typecheck` run?
      - [ ] **DB Rules:** If schema changed, was dev schema pushed (not incremental migration)?
      - [ ] **UI QA:** For UI changes, was `agent-browser` used to validate critical flow?
      - [ ] **Trigger Model:** Uses canonical domain event trigger ingress (not webhook-trigger route model)
      - [ ] **RLS:** All workflow tables include `org_id` and enforce org-scoped RLS
      - [ ] **AuthZ:** Admin-only writes and member read-only behavior are both enforced
      - [ ] **Parity:** Runtime routing semantics match reference (`start/restart/stop/ignore`)
      - [ ] **No Regressions:** Existing webhook delivery behavior remains intact

      ### Required Review Style
      - Findings first, ordered by severity, with file/line references
      - Focus on bugs/regressions/risk, not style nits
      - Explicitly state if no findings were identified

      ### Skills / Tools
      - Use the `senior-review` skill for code review rigor
      - Use the `agent-browser` skill for admin-ui validation when UI changed

      ### DON'T
      - ❌ Make code changes yourself
      - ❌ Be vague about what's wrong
      - ❌ Block on style nitpicks
