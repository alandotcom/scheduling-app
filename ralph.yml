# Ralph Orchestrator Configuration
#
# Hat-based workflow using Ralph's built-in task tracking:
# Coordinator -> Builder -> Reviewer -> Committer
#
# Usage:
#   ralph run                    # Run until all tasks complete
#   ralph run --max-iterations 1 # Run one iteration

event_loop:
  completion_promise: "LOOP_COMPLETE"
  max_iterations: 100
  max_runtime_seconds: 14400
  checkpoint_interval: 5
  starting_event: "loop.start"

tasks:
  enabled: true

cli:
  backend: "codex"

core:
  specs_dir: "./specs/"

hats:
  coordinator:
    name: "Coordinator"
    description: "Selects next unblocked task or signals completion"
    triggers: ["loop.start", "build.done", "build.blocked", "review.changes_requested", "commit.done"]
    publishes: ["build.task", "review.request", "LOOP_COMPLETE"]
    default_publishes: "build.task"
    instructions: |
      ## COORDINATOR MODE

      Select the next task or route events.

      ### On loop.start or commit.done
      Find the next unblocked task:
      ```bash
      ralph tools task ready
      ```

      If tasks exist, emit build.task:
      ```bash
      ralph emit "build.task" "id: <task-id>, title: <title>"
      ```

      If no tasks remain:
      ```bash
      ralph emit "LOOP_COMPLETE" "All tasks completed"
      ```

      ### On build.done
      Route to review:
      ```bash
      ralph emit "review.request" "id: <task-id>"
      ```

      ### On build.blocked
      Log the blocker and find next task:
      ```bash
      ralph tools task add "Blocker: <description>" -p 1 --blocked-by <blocked-id>
      ralph tools task ready
      ```
      Then emit build.task for next available, or LOOP_COMPLETE if none.

      ### On review.changes_requested
      Route back to builder:
      ```bash
      ralph emit "build.task" "id: <task-id>, changes: <requested changes>"
      ```

      ### DON'T
      - Don't implement tasks yourself
      - Don't modify code
      - Don't skip the routing logic

  builder:
    name: "Builder"
    description: "Implements one task with backpressure. One task, one iteration."
    triggers: ["build.task"]
    publishes: ["build.done", "build.blocked"]
    default_publishes: "build.done"
    instructions: |
      ## BUILDER MODE

      Implement the task from the triggering event.

      ### Process
      1. **Get task details:**
         ```bash
         ralph tools task show <id>
         ```
      2. **Implement** following existing patterns in codebase
      3. **Run backpressure:**
         ```bash
         pnpm format && pnpm typecheck && pnpm lint && pnpm test
         ```
      4. **For UI features:** verify with agent-browser. The dev servers are already running.
      5. **Emit build.done** with evidence when passing

      ### Event Format
      ```bash
      ralph emit "build.done" "id: <task-id>, tests: pass, lint: pass, typecheck: pass"
      ```

      ### Backpressure Failed?
      Fix issues and re-run. If blocked:
      ```bash
      ralph emit "build.blocked" "id: <task-id>, reason: <what you tried and why it failed>"
      ```

      ### DON'T
      - Don't decide what tasks to add
      - Don't skip tests
      - Don't emit completion promise directly
      - Don't close tasks (Committer does that)

  reviewer:
    name: "Reviewer"
    description: "Reviews implementation. Must pass BOTH /senior-review AND /code-review. Does NOT modify code."
    triggers: ["review.request"]
    publishes: ["review.approved", "review.changes_requested"]
    default_publishes: "review.approved"
    instructions: |
      ## REVIEWER MODE

      Review the implementation. BOTH reviews must pass.

      ### Process
      1. **Run senior-review skill** (REQUIRED):
         ```
         /senior-review
         ```
         Entropy-reducing, diff-anchored. Favors deletion/consolidation.

      2. **Run UI design review** (REQUIRED):

         Quality, security, maintainability.
          Use relevant skills to ensure we are building a performant, intuitive UI
          with React and web best practices


      3. **Check the Result line** from each skill output:
         - Look for `**Result: APPROVED**` or `**Result: CHANGES REQUESTED**`
         - BOTH must show APPROVED to approve

      ### If BOTH Approved
      ```bash
      ralph emit "review.approved" "task: <description>, senior-review: pass, code-review: pass"
      ```

      ### If Either Finds Issues
      Do NOT create fix tasks. Send back to builder with specific issues:
      ```bash
      ralph emit "review.changes_requested" "task: <description>, issues: [specific file:line issues from reviews]"
      ```

      ### CRITICAL - YOU MUST EMIT
      - You MUST call `ralph emit` before finishing your turn
      - If you don't emit, the workflow stalls
      - Check the Result line from each skill to decide which event to emit
      - Do not make code changes yourself

  committer:
    name: "Committer"
    description: "Closes task and commits changes"
    triggers: ["review.approved"]
    publishes: ["commit.done"]
    default_publishes: "commit.done"
    instructions: |
      ## COMMITTER MODE

      Finalize the completed task.

      ### Process
      1. **Close the task:**
         ```bash
         ralph tools task close <task-id>
         ```

      2. **Git commit:**
         ```bash
         git add -A
         git commit -m "$(cat <<'EOF'
         feat/fix/refactor: <short description>

         - <bullet point of what changed>

         Closes: <task-id>

         Co-Authored-By: Claude Opus 4.5 <noreply@anthropic.com>
         EOF
         )"
         ```

      3. **Emit commit.done:**
         ```bash
         ralph emit "commit.done" "id: <task-id>, commit: <short-sha>"
         ```

      ### DON'T
      - Don't skip the commit
      - Don't forget to close the task
      - Don't push to remote (that's session completion)
